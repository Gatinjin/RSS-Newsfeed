<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Daily Briefing</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper:        #f2ebe0;
      --paper-dark:   #e8dfd0;
      --ink:          #2b1f14;
      --ink-muted:    #7a6a58;
      --ink-faint:    #b5a898;
      --accent:       #8b3a1a;
      --accent-light: #c4622e;
      --rule:         #cfc0ae;
      --white:        #faf6f0;

      /* Category tag colours */
      --tag-it:       #1a4a7a;
      --tag-economy:  #2d6b3a;
      --tag-politics: #6b2d2d;
      --tag-lt:       #4a3a6b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 300;
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── MASTHEAD ── */
    .masthead {
      background: var(--ink);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .masthead-left {
      display: flex;
      flex-direction: column;
      padding: 14px 0;
    }

    .masthead h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--paper);
      letter-spacing: -0.01em;
      line-height: 1;
    }

    .masthead-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-top: 4px;
    }

    .masthead-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #clock {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--paper);
      letter-spacing: 0.05em;
      line-height: 1;
      text-align: right;
    }

    #clock-date {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-align: right;
      margin-top: 4px;
    }

    #refresh-btn {
      background: var(--accent);
      border: none;
      color: var(--paper);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s;
    }

    #refresh-btn:hover:not(:disabled) { background: var(--accent-light); }
    #refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    #refresh-btn.spinning .icon { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .icon { display: inline-block; }

    /* ── STATUS BAR ── */
    .statusbar {
      background: var(--paper-dark);
      border-bottom: 1px solid var(--rule);
      padding: 6px 32px;
    }

    #status {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--ink-muted);
    }

    /* ── MAIN ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 32px 80px;
    }

    .section-rule {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .section-rule span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      white-space: nowrap;
    }

    .section-rule::before,
    .section-rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    /* ── SOURCE TABS ── */
    #feed-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tab {
      border: 1px solid var(--rule);
      background: var(--white);
      color: var(--ink-muted);
      padding: 4px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab:hover  { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .tab.active { background: var(--accent); color: var(--paper); border-color: var(--accent); }

    /* ── FILTERS ── */
    #filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--rule);
      align-items: center;
    }

    #filters input,
    #filters select {
      border: 1px solid var(--rule);
      background: var(--white);
      color: var(--ink);
      padding: 6px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      outline: none;
      transition: border-color 0.15s;
    }

    #filters input:focus,
    #filters select:focus { border-color: var(--accent); }
    #filters input { flex: 1; min-width: 180px; }

    #filters button {
      border: 1px solid var(--rule);
      background: var(--white);
      color: var(--ink-muted);
      padding: 6px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    #filters button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* Category filter pills row */
    .cat-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      width: 100%;
      padding-top: 4px;
    }

    .cat-pill {
      border: 1px solid var(--rule);
      background: var(--white);
      color: var(--ink-muted);
      padding: 3px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }

    .cat-pill:hover { opacity: 0.8; }
    .cat-pill.active { color: var(--white); border-color: transparent; }
    .cat-pill[data-cat="it"].active        { background: var(--tag-it); }
    .cat-pill[data-cat="economy"].active   { background: var(--tag-economy); }
    .cat-pill[data-cat="politics"].active  { background: var(--tag-politics); }
    .cat-pill[data-cat="lt-news"].active   { background: var(--tag-lt); }

    /* ── HEADLINE LIST ── */
    #headlines { list-style: none; }

    #headlines li {
      padding: 14px 0;
      border-bottom: 1px solid var(--rule);
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto auto;
      column-gap: 12px;
      row-gap: 4px;
      align-items: start;
      animation: fadeIn 0.25s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Left column: source + lang stacked */
    .source-col {
      grid-column: 1;
      grid-row: 1 / 4;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 3px;
    }

    .source-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      background: var(--ink);
      color: var(--paper);
      padding: 2px 6px;
      white-space: nowrap;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .lang-tag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--ink-faint);
      border: 1px solid var(--rule);
      padding: 1px 5px;
      text-align: center;
      letter-spacing: 0.06em;
    }

    /* Right column rows */
    #headlines a {
      grid-column: 2;
      grid-row: 1;
      color: var(--ink);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.45;
      transition: color 0.15s;
    }

    #headlines a:hover   { color: var(--accent); }
    #headlines a:visited { color: var(--ink-muted); }

    /* Category + keyword tags row */
    .article-tags {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }

    .atag {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      padding: 1px 6px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      white-space: nowrap;
      color: var(--white);
    }

    .atag-it       { background: var(--tag-it); }
    .atag-economy  { background: var(--tag-economy); }
    .atag-politics { background: var(--tag-politics); }
    .atag-lt-news  { background: var(--tag-lt); }

    /* keyword chips — subtle, outlined */
    .kword {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      padding: 1px 5px;
      letter-spacing: 0.05em;
      color: var(--ink-muted);
      border: 1px solid var(--rule);
      white-space: nowrap;
    }

    .meta {
      grid-column: 2;
      grid-row: 3;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
    }

    /* ── EMPTY STATE ── */
    #empty {
      padding: 60px 0;
      text-align: center;
      color: var(--ink-faint);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      display: none;
    }

    @media (max-width: 600px) {
      .masthead { padding: 0 16px; }
      .masthead h1 { font-size: 1.4rem; }
      #clock { font-size: 1.1rem; }
      main { padding: 16px 16px 60px; }
      .statusbar { padding: 6px 16px; }
    }
  </style>
</head>
<body>

  <!-- MASTHEAD -->
  <header class="masthead">
    <div class="masthead-left">
      <h1>The Daily Feed</h1>
      <div class="masthead-sub">Personal news aggregator</div>
    </div>
    <div class="masthead-right">
      <button id="refresh-btn" onclick="manualRefresh()">
        <span class="icon">↻</span>
        <span>Refresh</span>
      </button>
      <div>
        <div id="clock">00:00:00</div>
        <div id="clock-date"></div>
      </div>
    </div>
  </header>

  <!-- STATUS BAR -->
  <div class="statusbar">
    <span id="status">Loading feeds...</span>
  </div>

  <!-- MAIN -->
  <main>
    <div class="section-rule"><span>Sources</span></div>
    <div id="feed-tabs"></div>

    <div id="filters">
      <input type="text" id="search" placeholder="Search headlines..." oninput="applyFilters()">

      <select id="date-filter" onchange="applyFilters()">
        <option value="">Any time</option>
        <option value="today">Today</option>
        <option value="week">This week</option>
        <option value="month">This month</option>
      </select>

      <button onclick="resetFilters()">Clear</button>

      <!-- Category filter pills -->
      <div class="cat-filters">
        <button class="cat-pill" data-cat="it"       onclick="toggleCat('it')">IT</button>
        <button class="cat-pill" data-cat="economy"  onclick="toggleCat('economy')">Economy</button>
        <button class="cat-pill" data-cat="politics" onclick="toggleCat('politics')">Politics</button>
        <button class="cat-pill" data-cat="lt-news"  onclick="toggleCat('lt-news')">LT News</button>
      </div>
    </div>

    <div class="section-rule"><span id="count-label">Headlines</span></div>
    <ul id="headlines"></ul>
    <p id="empty">No headlines match your filters.</p>
  </main>

  <script>
    // ── SOURCES ──────────────────────────────────────────
    const SOURCES = [
      { name: "DW",             lang: "EN", url: "https://rss.dw.com/rdf/rss-en-all" },
      { name: "Guardian",       lang: "EN", url: "https://www.theguardian.com/world/rss" },
      { name: "WSJ",            lang: "EN", url: "https://feeds.content.dowjones.io/public/rss/mw_topstories" },
      { name: "The Times",      lang: "EN", url: "https://openrss.org/thetimes.com" },
      { name: "Delfi",          lang: "LT", url: "https://www.delfi.lt/rss/feeds/lithuania.xml" },
      { name: "LRT",            lang: "LT", url: "https://www.lrt.lt/?rss" },
      { name: "15min",          lang: "LT", url: "https://www.15min.lt/rss" },
      { name: "Lrytas",         lang: "LT", url: "https://www.lrytas.lt/rss" },
      { name: "Verslo Žinios",  lang: "LT", url: "https://www.vz.lt/rss/feeds/all" },
    ];

    const MAX_PER_SOURCE = 12;

    // ── KEYWORD → CATEGORY MAP ────────────────────────────
    // Each article title is scanned for these keywords to auto-assign tags.
    // An article can have multiple category tags.
    //const CAT_KEYWORDS = {
      //it: [
       // "tech", "technology", "software", "hardware", "ai", "artificial intelligence",
       // "cyber", "hacker", "hack", "data", "cloud", "startup", "digital", "chip",
       // "semiconductor", "internet", "silicon", "app ", "robot", "automation",
       // "technologij", "skaitmen", "programin", "dirbtinis", "intelektas", "kibernetin",
      //],
      //economy: [
       // "economy", "economic", "market", "stock", "trade", "gdp", "inflation",
       // "bank", "finance", "financial", "invest", "budget", "tax", "revenue",
       // "export", "import", "euro ", "dollar", "interest rate", "growth", "recession",
       // "sanction", "energy price", "oil", "gas price",
       // "verslo", "ekonom", "rinka", "biudžet", "bankas", "investicij",
       // "finans", "akcij", "valiut", "eksport", "importas", "infliacija",
     //],
      //politics: [
        //"politic", "government", "election", "president", "prime minister", "parliament",
       // "senate", "congress", "nato", " eu ", "european union", "treaty", "diplomac",
        //"foreign policy", "war", "military", "conflict", "sanction", "vote", "party",
        //"seimas", "vyriausyb", "prezident", "rinkimai", "partij", "ministras",
        //"karinis", "kariuomen", "gynybos",
      //],
      //"lt-news": [
        //"lietuv", "vilnius", "kaunas", "klaipėda", "klaipeda", "šiauliai", "siauliai",
       // "panevėžys", "panevezys", "lithuanian", "lithuania", "baltic", "baltij",
       // "latvij", "estij", "latvian", "estonian",
      //],
    //};

    // Friendly label for each category
    const CAT_LABELS = {
      it:        "IT",
      economy:   "Economy",
      politics:  "Politics",
      "lt-news": "LT News",
    };

    // ── STATE ─────────────────────────────────────────────
    let allItems      = [];
    let activeSource  = "All";
    let activecat     = null; // single active category filter

    // ── CLOCK ─────────────────────────────────────────────
    function updateClock() {
      const now  = new Date();
      const hh   = String(now.getHours()).padStart(2, "0");
      const mm   = String(now.getMinutes()).padStart(2, "0");
      const ss   = String(now.getSeconds()).padStart(2, "0");
      document.getElementById("clock").textContent = `${hh}:${mm}:${ss}`;
      const days   = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      document.getElementById("clock-date").textContent =
        `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── PUBLISH TIME ──────────────────────────────────────
    function formatTime(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr);
      if (isNaN(d)) return "";
      const diffMs = Date.now() - d;
      const diffM  = Math.floor(diffMs / 60000);
      const diffH  = Math.floor(diffMs / 3600000);
      const timeStr  = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      const dateStr2 = d.toLocaleDateString([], { month: "short", day: "numeric" });
      if (diffM < 1)  return "Just now";
      if (diffM < 60) return `${diffM}m ago · ${timeStr}`;
      if (diffH < 24) return `${diffH}h ago · ${timeStr}`;
      return `${dateStr2} · ${timeStr}`;
    }

    // ── DETECT CATEGORIES FROM TITLE ─────────────────────
    // Returns array of matched category keys, e.g. ["it", "economy"]
    function detectCategories(title) {
      const lower = title.toLowerCase();
      return Object.keys(CAT_KEYWORDS).filter(cat =>
        CAT_KEYWORDS[cat].some(kw => lower.includes(kw))
      );
    }

    // ── DETECT KEYWORDS FROM TITLE ────────────────────────
    // Returns the specific keyword strings that triggered the category match,
    // deduplicated and limited to avoid clutter.
    function detectKeywords(title) {
      const lower = title.toLowerCase();
      const found = [];
      for (const kws of Object.values(CAT_KEYWORDS)) {
        for (const kw of kws) {
          if (lower.includes(kw) && !found.includes(kw.trim())) {
            found.push(kw.trim());
          }
        }
      }
      // Cap at 4 keywords to avoid visual clutter
      return found.slice(0, 4);
    }

    // ── FETCH ONE FEED ────────────────────────────────────
    async function fetchFeed(source) {
      const url  = `https://api.rss2json.com/v1/api.json?rss_url=${
        encodeURIComponent(source.url)}&count=${MAX_PER_SOURCE}`;
      const res  = await fetch(url);
      const data = await res.json();
      return (data.items || []).map(item => {
        const cats = detectCategories(item.title || "");
        const kws  = detectKeywords(item.title || "");
        return {
          ...item,
          source:      source.name,
          lang:        source.lang,
          categories:  cats,
          keywords:    kws,
        };
      });
    }

    // ── LOAD ALL FEEDS ────────────────────────────────────
    async function loadAll() {
      document.getElementById("status").textContent = "Fetching feeds...";
      const results = await Promise.allSettled(SOURCES.map(fetchFeed));

      allItems = results
        .filter(r => r.status === "fulfilled")
        .flatMap(r => r.value)
        .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

      buildTabs();
      applyFilters();

      const t = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      document.getElementById("status").textContent =
        `${allItems.length} headlines · last updated ${t} · auto-refreshes every 15 min`;
    }

    // ── MANUAL REFRESH ────────────────────────────────────
    async function manualRefresh() {
      const btn = document.getElementById("refresh-btn");
      btn.classList.add("spinning");
      btn.disabled = true;
      await loadAll();
      btn.classList.remove("spinning");
      btn.disabled = false;
    }

    // ── BUILD SOURCE TABS ─────────────────────────────────
    function buildTabs() {
      const tabs  = document.getElementById("feed-tabs");
      const names = ["All", ...SOURCES.map(s => s.name)];
      tabs.innerHTML = names
        .map(n => `<button class="tab ${n === activeSource ? "active" : ""}"
          onclick="filter('${n}')">${n}</button>`)
        .join("");
    }

    // ── SOURCE TAB CLICK ──────────────────────────────────
    function filter(name) {
      activeSource = name;
      buildTabs();
      applyFilters();
    }

    // ── CATEGORY PILL TOGGLE ──────────────────────────────
    function toggleCat(cat) {
      activecat = activecat === cat ? null : cat;
      document.querySelectorAll(".cat-pill").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.cat === activecat);
      });
      applyFilters();
    }

    // ── APPLY ALL FILTERS ─────────────────────────────────
    function applyFilters() {
      const keyword   = document.getElementById("search").value.toLowerCase();
      const dateRange = document.getElementById("date-filter").value;

      const now  = new Date();
      const cuts = {
        today: new Date(now - 1000 * 60 * 60 * 24),
        week:  new Date(now - 1000 * 60 * 60 * 24 * 7),
        month: new Date(now - 1000 * 60 * 60 * 24 * 30),
      };

      const filtered = allItems.filter(item => {
        if (activeSource !== "All" && item.source !== activeSource) return false;
        if (activecat && !item.categories.includes(activecat))       return false;
        if (keyword && !item.title.toLowerCase().includes(keyword))  return false;
        if (dateRange && new Date(item.pubDate) < cuts[dateRange])   return false;
        return true;
      });

      render(filtered);
    }

    // ── RESET FILTERS ─────────────────────────────────────
    function resetFilters() {
      document.getElementById("search").value      = "";
      document.getElementById("date-filter").value = "";
      activeSource = "All";
      activecat    = null;
      document.querySelectorAll(".cat-pill").forEach(b => b.classList.remove("active"));
      buildTabs();
      applyFilters();
    }

    // ── RENDER ────────────────────────────────────────────
    function render(items) {
      const list  = document.getElementById("headlines");
      const empty = document.getElementById("empty");
      const label = document.getElementById("count-label");

      label.textContent = `${items.length} headline${items.length !== 1 ? "s" : ""}`;

      if (items.length === 0) {
        list.innerHTML      = "";
        empty.style.display = "block";
        return;
      }

      empty.style.display = "none";
      list.innerHTML = items.map(item => {
        // Category tags
        const catTags = item.categories.map(c =>
          `<span class="atag atag-${c}">${CAT_LABELS[c]}</span>`
        ).join("");

        // Keyword chips — only show if there are matched keywords
        const kwChips = item.keywords.map(kw =>
          `<span class="kword">${kw}</span>`
        ).join("");

        const tagsRow = (catTags || kwChips)
          ? `<div class="article-tags">${catTags}${kwChips}</div>`
          : "";

        return `
          <li>
            <div class="source-col">
              <span class="source-tag">${item.source}</span>
              <span class="lang-tag">${item.lang}</span>
            </div>
            <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
            ${tagsRow}
            <div class="meta">${formatTime(item.pubDate)}</div>
          </li>
        `;
      }).join("");
    }

    // ── START ─────────────────────────────────────────────
