<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My News Feed</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #f2ebe0;
    --paper-dark:   #e8dfd0;
    --ink:          #2b1f14;
    --ink-muted:    #7a6a58;
    --ink-faint:    #b5a898;
    --accent:       #8b3a1a;
    --accent-light: #c4622e;
    --rule:         #cfc0ae;
    --white:        #faf6f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Source Serif 4', Georgia, serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* ── MASTHEAD ── */
  .masthead {
    background: var(--ink);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .masthead-left {
    display: flex;
    flex-direction: column;
    padding: 14px 0;
  }

  .masthead h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--paper);
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .masthead-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: 4px;
  }

  .masthead-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* Live clock */
  #clock {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--paper);
    letter-spacing: 0.05em;
    line-height: 1;
    text-align: right;
  }

  #clock-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    text-align: right;
    margin-top: 4px;
  }

  /* Refresh button */
  #refresh-btn {
    background: var(--accent);
    border: none;
    color: var(--paper);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.2s;
  }

  #refresh-btn:hover:not(:disabled) { background: var(--accent-light); }
  #refresh-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  #refresh-btn.spinning .icon { animation: spin 0.7s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .icon { display: inline-block; }

  /* ── STATUS BAR ── */
  .statusbar {
    background: var(--paper-dark);
    border-bottom: 1px solid var(--rule);
    padding: 6px 32px;
  }

  #status {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--ink-muted);
  }

  /* ── MAIN ── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 24px 32px 80px;
  }

  /* Section rule */
  .section-rule {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .section-rule span {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-faint);
    white-space: nowrap;
  }

  .section-rule::before,
  .section-rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--rule);
  }

  /* Source tabs */
  #feed-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }

  .tab {
    border: 1px solid var(--rule);
    background: var(--white);
    color: var(--ink-muted);
    padding: 4px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab:hover  { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .tab.active { background: var(--accent); color: var(--paper); border-color: var(--accent); }

  /* Filters bar */
  #filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--rule);
    align-items: center;
  }

  #filters input,
  #filters select {
    border: 1px solid var(--rule);
    background: var(--white);
    color: var(--ink);
    padding: 6px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    outline: none;
    transition: border-color 0.15s;
  }

  #filters input:focus,
  #filters select:focus { border-color: var(--accent); }

  #filters input { flex: 1; min-width: 180px; }

  #filters button {
    border: 1px solid var(--rule);
    background: var(--white);
    color: var(--ink-muted);
    padding: 6px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  #filters button:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* Headline list */
  #headlines { list-style: none; }

  #headlines li {
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: auto 1fr;
    grid-template-rows: auto auto;
    column-gap: 12px;
    row-gap: 3px;
    align-items: start;
    animation: fadeIn 0.25s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .headline-tags {
    grid-column: 1;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-top: 3px;
  }

  .source-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    background: var(--ink);
    color: var(--paper);
    padding: 2px 6px;
    white-space: nowrap;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .category-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 1px 5px;
    white-space: nowrap;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #headlines a {
    grid-column: 2;
    grid-row: 1;
    color: var(--ink);
    text-decoration: none;
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.45;
    transition: color 0.15s;
  }

  #headlines a:hover   { color: var(--accent); }
  #headlines a:visited { color: var(--ink-muted); }

  .meta {
    grid-column: 2;
    grid-row: 2;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--ink-faint);
    letter-spacing: 0.04em;
  }

  /* Empty state */
  #empty {
    padding: 60px 0;
    text-align: center;
    color: var(--ink-faint);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: none;
  }

  @media (max-width: 600px) {
    .masthead { padding: 0 16px; }
    .masthead h1 { font-size: 1.4rem; }
    #clock { font-size: 1.1rem; }
    main { padding: 16px 16px 60px; }
    .statusbar { padding: 6px 16px; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-left">
    <h1>The Daily Feed</h1>
    <div class="masthead-sub">Personal news aggregator</div>
  </div>
  <div class="masthead-right">
    <button id="refresh-btn" onclick="manualRefresh()">
      <span class="icon">↻</span>
      <span>Refresh</span>
    </button>
    <div>
      <div id="clock">00:00:00</div>
      <div id="clock-date"></div>
    </div>
  </div>
</header>

<div class="statusbar">
  <span id="status">Loading feeds...</span>
</div>

<main>
  <div class="section-rule"><span>Sources</span></div>
  <div id="feed-tabs"></div>

  <div id="filters">
    <input type="text" id="search" placeholder="Search headlines..." oninput="applyFilters()">

    <select id="category" onchange="applyFilters()">
      <option value="">All categories</option>
      <option value="tech">Tech</option>
      <option value="world">World</option>
      <option value="sports">Sports</option>
    </select>

    <select id="date-filter" onchange="applyFilters()">
      <option value="">Any time</option>
      <option value="today">Today</option>
      <option value="week">This week</option>
      <option value="month">This month</option>
    </select>

    <button onclick="resetFilters()">Clear</button>
  </div>

  <div class="section-rule"><span id="count-label">Headlines</span></div>
  <ul id="headlines"></ul>
  <p id="empty">No headlines match your filters.</p>
</main>

<script>
  // ── 1. SOURCES ───────────────────────────────────────────
  const SOURCES = [
    { name: "BBC",         url: "https://feeds.bbci.co.uk/news/rss.xml",   category: "world" },
    { name: "Hacker News", url: "https://hnrss.org/frontpage",              category: "tech"  },
    { name: "The Verge",   url: "https://www.theverge.com/rss/index.xml",   category: "tech"  },
    { name: "Deutsche Welle", url: "https://www.dw.com/de/rss-aktuell/s-10019",       category: "world" },
    { name: "Wall Street Journal", url: "https://www.wsj.com/news/rss/rss_2_0.xml", category: "world" },
    { name: "TechCrunch",  url: "https://techcrunch.com/feed/",              category: "tech"  },
    { name: "Reuters",      url: "https://www.reutersagency.com/feed/?best-topics=technology&post_type=best", category: "tech"  },
    { name: "Al Jazeera",   url: "https://www.aljazeera.com/xml/rss/all.xml", category: "world" },
    { name: "LRT News",        url: "https://www.lrt.lt/rss", category: "LT" },
    {guardian: "The Guardian", url: "https://www.theguardian.com/world/rss", category: "world" },
  ];

  const MAX_PER_SOURCE = 10;

  // ── 2. STATE ─────────────────────────────────────────────
  let allItems     = [];
  let activeSource = "All";

  // ── 3. LIVE CLOCK ────────────────────────────────────────
  function updateClock() {
    const now  = new Date();
    const hh   = String(now.getHours()).padStart(2, '0');
    const mm   = String(now.getMinutes()).padStart(2, '0');
    const ss   = String(now.getSeconds()).padStart(2, '0');
    document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;

    const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('clock-date').textContent =
      `${days[now.getDay()]} · ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  }
  updateClock();
  setInterval(updateClock, 1000);

  // ── 4. FORMAT PUBLISH TIME ───────────────────────────────
  function formatTime(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    if (isNaN(d)) return '';

    const diffMs = Date.now() - d;
    const diffM  = Math.floor(diffMs / 60000);
    const diffH  = Math.floor(diffMs / 3600000);
    const timeStr  = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const dateStr2 = d.toLocaleDateString([], { month: 'short', day: 'numeric' });

    if (diffM < 1)  return 'Just now';
    if (diffM < 60) return `${diffM}m ago · ${timeStr}`;
    if (diffH < 24) return `${diffH}h ago · ${timeStr}`;
    return `${dateStr2} · ${timeStr}`;
  }

  // ── 5. FETCH ONE FEED ────────────────────────────────────
  async function fetchFeed(source) {
    const url  = `https://api.rss2json.com/v1/api.json?rss_url=${
      encodeURIComponent(source.url)}&count=${MAX_PER_SOURCE}`;
    const res  = await fetch(url);
    const data = await res.json();
    return (data.items || []).map(item => ({
      ...item,
      source:   source.name,
      category: source.category,
    }));
  }

  // ── 6. LOAD ALL FEEDS ────────────────────────────────────
  async function loadAll() {
    document.getElementById('status').textContent = 'Fetching feeds...';
    const results = await Promise.allSettled(SOURCES.map(fetchFeed));

    allItems = results
      .filter(r => r.status === 'fulfilled')
      .flatMap(r => r.value)
      .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

    buildTabs();
    applyFilters();

    const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('status').textContent =
      `${allItems.length} headlines · last updated ${t} · auto-refreshes every 15 min`;
  }

  // ── 7. MANUAL REFRESH ────────────────────────────────────
  async function manualRefresh() {
    const btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    btn.disabled = true;
    await loadAll();
    btn.classList.remove('spinning');
    btn.disabled = false;
  }

  // ── 8. BUILD SOURCE TABS ─────────────────────────────────
  function buildTabs() {
    const tabs  = document.getElementById('feed-tabs');
    const names = ['All', ...SOURCES.map(s => s.name)];
    tabs.innerHTML = names
      .map(n => `<button class="tab ${n === activeSource ? 'active' : ''}"
        onclick="filter('${n}')">${n}</button>`)
      .join('');
  }

  // ── 9. SOURCE TAB CLICK ──────────────────────────────────
  function filter(name) {
    activeSource = name;
    buildTabs();
    applyFilters();
  }

  // ── 10. APPLY ALL FILTERS ────────────────────────────────
  function applyFilters() {
    const keyword   = document.getElementById('search').value.toLowerCase();
    const category  = document.getElementById('category').value;
    const dateRange = document.getElementById('date-filter').value;

    const now  = new Date();
    const cuts = {
      today: new Date(now - 1000 * 60 * 60 * 24),
      week:  new Date(now - 1000 * 60 * 60 * 24 * 7),
      month: new Date(now - 1000 * 60 * 60 * 24 * 30),
    };

    const filtered = allItems.filter(item => {
      if (activeSource !== 'All' && item.source !== activeSource) return false;
      if (category && item.category !== category)                  return false;
      if (keyword  && !item.title.toLowerCase().includes(keyword)) return false;
      if (dateRange && new Date(item.pubDate) < cuts[dateRange])   return false;
      return true;
    });

    render(filtered);
  }

  // ── 11. RESET FILTERS ────────────────────────────────────
  function resetFilters() {
    document.getElementById('search').value      = '';
    document.getElementById('category').value    = '';
    document.getElementById('date-filter').value = '';
    activeSource = 'All';
    buildTabs();
    applyFilters();
  }

  // ── 12. RENDER ───────────────────────────────────────────
  function render(items) {
    const list  = document.getElementById('headlines');
    const empty = document.getElementById('empty');
    const label = document.getElementById('count-label');

    label.textContent = `${items.length} headline${items.length !== 1 ? 's' : ''}`;

    if (items.length === 0) {
      list.innerHTML      = '';
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    list.innerHTML = items.map(item => `
      <li>
        <div class="headline-tags">
          <span class="source-tag">${item.source}</span>
          <span class="category-tag">${item.category}</span>
        </div>
        <a href="${item.link}" target="_blank" rel="noopener">${item.title}</a>
        <div class="meta">${formatTime(item.pubDate)}</div>
      </li>
    `).join('');
  }

  // ── 13. START ────────────────────────────────────────────
  loadAll();
  setInterval(loadAll, 15 * 60 * 1000);
</script>

</body>
</html>
